[profile.default]
src = "src"
out = "out"
libs = ["lib"]
script = "script"
test = "test"

# Solidity version matching the contracts in transaction artifacts
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
# Override at runtime: BSC_RPC_URL=... forge script ...
bsc = "${BSC_RPC_URL}"

